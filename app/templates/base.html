<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ config.APP_NAME }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-shell">
        <header class="site-header">
            <div class="site-header__inner">
                <a class="site-title" href="{{ url_for('main.index') }}">{{ config.APP_NAME }}</a>
                <nav class="main-nav" aria-label="Основное меню">
                    <a href="{{ url_for('main.index') }}">Главная</a>
                    <a href="{{ url_for('main.about') }}">О проекте</a>
                    <a href="{{ url_for('main.contacts') }}">Контакты</a>
                </nav>
            </div>
        </header>

        <main class="page">
            {% if breadcrumbs %}
            <nav class="breadcrumbs" aria-label="Хлебные крошки">
                {% for item in breadcrumbs %}
                    {% if item.endpoint %}
                    <a href="{{ url_for(item.endpoint) }}">{{ item.title }}</a>
                    {% else %}
                    <span>{{ item.title }}</span>
                    {% endif %}
                {% endfor %}
            </nav>
            {% endif %}

            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
