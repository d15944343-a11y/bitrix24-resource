{% extends "base.html" %}

{% block title %}Страница не найдена | {{ config.APP_NAME }}{% endblock %}

{% block content %}
<section class="card auth-card">
    <h1>Ошибка 404</h1>
    <p>Запрашиваемая страница не найдена. Возможно, ссылка устарела или адрес был введен с ошибкой.</p>
    <div class="section-actions">
        <a class="button" href="{{ url_for('main.index') }}">Вернуться на главную</a>
    </div>
</section>
{% endblock %}
