{% extends "base.html" %}

{% block title %}Редактирование клиента | {{ config.APP_NAME }}{% endblock %}

{% block content %}
<section class="card">
    <h1>Редактирование CRM-клиента</h1>
    <p>Измените профиль клиента и сохраните обновления. После сохранения прогноз пересчитывается автоматически.</p>

    <form class="edit-form" method="post">
        <div class="form-grid">
            <label class="form-field">
                <span>ФИО</span>
                <input type="text" name="full_name" value="{{ form_data.get('full_name', '') }}" required>
            </label>

            <label class="form-field">
                <span>Код клиента</span>
                <input type="text" name="customer_code" value="{{ form_data.get('customer_code', '') }}" required>
            </label>

            <label class="form-field">
                <span>Email</span>
                <input type="email" name="email" value="{{ form_data.get('email', '') }}" required>
            </label>

            <label class="form-field">
                <span>Телефон</span>
                <input type="text" name="phone" value="{{ form_data.get('phone', '') }}" required>
            </label>

            <label class="form-field">
                <span>Город</span>
                <input type="text" name="city" value="{{ form_data.get('city', '') }}" required>
            </label>

            <label class="form-field">
                <span>Статус</span>
                <select name="status">
                    {% for status in statuses %}
                    <option value="{{ status }}" {% if form_data.get('status') == status %}selected{% endif %}>{{ status }}</option>
                    {% endfor %}
                </select>
            </label>

            <label class="form-field">
                <span>Срок обслуживания, мес.</span>
                <input type="number" min="0" name="tenure_months" value="{{ form_data.get('tenure_months', 0) }}" required>
            </label>

            <label class="form-field">
                <span>Количество сервисов</span>
                <input type="number" min="0" name="service_count" value="{{ form_data.get('service_count', 1) }}" required>
            </label>

            <label class="form-field">
                <span>Ежемесячная выручка</span>
                <input type="number" step="0.01" min="0" name="monthly_charges" value="{{ form_data.get('monthly_charges', 0) }}" required>
            </label>

            <label class="form-field">
                <span>Накопленная выручка</span>
                <input type="number" step="0.01" min="0" name="total_charges" value="{{ form_data.get('total_charges', 0) }}" required>
            </label>

            <label class="form-field">
                <span>Тип контракта</span>
                <select name="contract_type">
                    {% for item in contract_choices %}
                    <option value="{{ item }}" {% if form_data.get('contract_type') == item %}selected{% endif %}>{{ item }}</option>
                    {% endfor %}
                </select>
            </label>

            <label class="form-field">
                <span>Способ оплаты</span>
                <select name="payment_method">
                    {% for item in payment_choices %}
                    <option value="{{ item }}" {% if form_data.get('payment_method') == item %}selected{% endif %}>{{ item }}</option>
                    {% endfor %}
                </select>
            </label>

            <label class="form-field">
                <span>Интернет-услуга</span>
                <select name="internet_service">
                    {% for item in internet_choices %}
                    <option value="{{ item }}" {% if form_data.get('internet_service') == item %}selected{% endif %}>{{ item }}</option>
                    {% endfor %}
                </select>
            </label>
        </div>

        <div class="checkbox-grid">
            <label class="checkbox-field">
                <input type="checkbox" name="senior_citizen" {% if form_data.get('senior_citizen') %}checked{% endif %}>
                <span>Старшая возрастная группа</span>
            </label>
            <label class="checkbox-field">
                <input type="checkbox" name="paperless_billing" {% if form_data.get('paperless_billing') %}checked{% endif %}>
                <span>Безбумажный биллинг</span>
            </label>
            <label class="checkbox-field">
                <input type="checkbox" name="has_family_plan" {% if form_data.get('has_family_plan') %}checked{% endif %}>
                <span>Семейный тариф</span>
            </label>
            <label class="checkbox-field">
                <input type="checkbox" name="has_tech_support" {% if form_data.get('has_tech_support') %}checked{% endif %}>
                <span>Техподдержка подключена</span>
            </label>
        </div>

        <button class="button" type="submit">Сохранить изменения</button>
    </form>
</section>
{% endblock %}
